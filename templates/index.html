<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Price Tag Detector</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 600px; margin: 80px auto; padding: 0 20px; }
    h1 { text-align: center; margin-bottom: 30px; font-size: 24px; }

    .upload-area {
        border: 2px dashed #ccc;
        border-radius: 12px;
        padding: 50px 20px;
        text-align: center;
        cursor: pointer;
        background: #fff;
        transition: border-color 0.2s;
    }
    .upload-area:hover, .upload-area.dragover { border-color: #4a90d9; }
    .upload-area p { color: #888; margin-top: 10px; }

    .file-info {
        margin-top: 15px;
        padding: 10px 15px;
        background: #e8f0fe;
        border-radius: 8px;
        font-size: 14px;
        display: none;
    }

    .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 20px;
        transition: background 0.2s;
    }
    .btn-primary { background: #4a90d9; color: #fff; }
    .btn-primary:hover { background: #357abd; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: #4a90d9; border: 1px solid #4a90d9; }
    .btn-secondary:hover { background: #f0f5ff; }

    .progress-section { margin-top: 30px; display: none; }
    .progress-bar-bg {
        width: 100%;
        height: 24px;
        background: #e0e0e0;
        border-radius: 12px;
        overflow: hidden;
    }
    .progress-bar-fill {
        height: 100%;
        background: #4a90d9;
        border-radius: 12px;
        transition: width 0.3s;
        width: 0%;
    }
    .progress-text { margin-top: 8px; font-size: 14px; color: #666; }
    .status-done { color: #2e7d32; font-weight: bold; margin-top: 15px; font-size: 16px; }
    .status-error { color: #c62828; font-weight: bold; margin-top: 15px; font-size: 14px; }

    #fileInput { display: none; }
</style>
</head>
<body>
<div class="container">
    <h1>Price Tag Detector</h1>

    <p style="text-align:center; color:#666; font-size:14px; margin-bottom:25px; line-height:1.6;">
        После обработки откроется страница с результатами: таблица всех распознанных полей,
        фотографии ценников и исходный текст OCR для отладки.
        CSV можно скачать из верхней панели на странице результатов.
    </p>

    <div class="upload-area" id="dropZone">
        <p>Перетащите видео сюда или нажмите для выбора</p>
        <p style="font-size:12px; color:#aaa;">MP4, AVI, MOV</p>
    </div>
    <input type="file" id="fileInput" accept="video/*">

    <div class="file-info" id="fileInfo"></div>

    <label style="display:flex; align-items:center; gap:8px; margin-top:15px; font-size:14px; cursor:pointer;">
        <input type="checkbox" id="assume99" checked style="width:16px; height:16px;">
        Заменять 00 копеек на 99 (если OCR не распознал копейки)
    </label>

    <button class="btn btn-primary" id="submitBtn" disabled>Обработать</button>

    <div class="progress-section" id="progressSection">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
        <div class="progress-text" id="progressText">Ожидание...</div>
        <div id="statusMessage"></div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const submitBtn = document.getElementById('submitBtn');
    const progressSection = document.getElementById('progressSection');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const statusMessage = document.getElementById('statusMessage');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) selectFile(fileInput.files[0]);
    });

    function selectFile(file) {
        if (!file.type.startsWith('video/')) {
            alert('Выберите видео файл');
            return;
        }
        selectedFile = file;
        const sizeMB = (file.size / 1024 / 1024).toFixed(1);
        fileInfo.textContent = file.name + ' (' + sizeMB + ' MB)';
        fileInfo.style.display = 'block';
        submitBtn.disabled = false;
    }

    submitBtn.addEventListener('click', async () => {
        if (!selectedFile) return;
        submitBtn.disabled = true;

        const formData = new FormData();
        formData.append('video', selectedFile);
        formData.append('assume_99_kopecks', document.getElementById('assume99').checked ? '1' : '0');

        try {
            const resp = await fetch('/upload', { method: 'POST', body: formData });
            const data = await resp.json();
            const taskId = data.task_id;

            progressSection.style.display = 'block';
            statusMessage.innerHTML = '';
            connectWS(taskId);

        } catch (e) {
            alert('Ошибка загрузки: ' + e);
            submitBtn.disabled = false;
        }
    });

    function connectWS(taskId) {
        const ws = new WebSocket('ws://' + location.host + '/ws/' + taskId);

        ws.onmessage = function(event) {
            const d = JSON.parse(event.data);
            const pct = Math.round(d.progress * 100);
            progressBar.style.width = pct + '%';
            progressText.textContent = d.message + ' (' + pct + '%)';

            if (d.status === 'done') {
                progressText.textContent = 'Готово!';
                progressBar.style.background = '#2e7d32';
                statusMessage.innerHTML = '<div class="status-done">Обработка завершена</div>';
                setTimeout(() => window.location.href = '/result/' + taskId, 800);
            } else if (d.status === 'error') {
                progressText.textContent = 'Ошибка';
                progressBar.style.background = '#c62828';
                statusMessage.innerHTML = '<div class="status-error">' + d.message + '</div>';
                submitBtn.disabled = false;
            }
        };

        ws.onerror = function() {
            progressText.textContent = 'Ошибка соединения';
            submitBtn.disabled = false;
        };
    }
</script>
</body>
</html>
